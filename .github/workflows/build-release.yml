name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libboost-all-dev libssl-dev imagemagick clamav ffmpeg
          # Try to update clamav database, but don't fail if it doesn't work (rate limiting etc)
          sudo freshclam || true

      - name: Configure CMake
        run: cmake -S c++ -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j $(nproc)

      - name: Run Tests
        run: ./tests/run_tests.sh ./build/convertdav

      - name: Package
        run: |
          mkdir -p release
          cp build/convertdav release/
          cd release && tar -czvf ../convertdav-linux.tar.gz convertdav

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: convertdav-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
